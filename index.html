<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>1 Year Anniversary</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0d12;
  --accent: #ff6ec7;
  --accent-soft: rgba(255,110,199,0.35);
  --glass: rgba(255,255,255,0.08);
  --text: #f5f7ff;
  --muted: #a0a4b8;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #161b33, var(--bg));
  color: var(--text);
  overflow-x: hidden;
}

/* ---------- LOGIN ---------- */
.login {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-box {
  width: 100%;
  max-width: 380px;
  background: var(--glass);
  backdrop-filter: blur(18px);
  border-radius: 26px;
  padding: 36px;
  text-align: center;
  box-shadow: 0 0 40px rgba(255,110,199,0.15);
}

.login-box h1 {
  font-size: 2rem;
  margin-bottom: 10px;
  text-shadow: 0 0 16px var(--accent-soft);
}

.login-box p {
  font-size: 0.95rem;
  color: var(--muted);
  margin-bottom: 28px;
}

.login-box input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.12);
  color: var(--text);
  font-size: 1rem;
  margin-bottom: 16px;
}

.login-box button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg, var(--accent), #b86bff);
  color: white;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
}

/* ---------- MAIN CONTENT ---------- */
.hidden {
  display: none;
}

/* ---------- MUSIC BAR ---------- */
.music-bar {
  position: sticky;
  top: 12px;
  z-index: 10;
  display: flex;
  gap: 10px;
  justify-content: center;
  padding: 10px;
}

.track {
  padding: 10px 16px;
  border-radius: 999px;
  background: var(--glass);
  backdrop-filter: blur(14px);
  font-size: 0.85rem;
  color: var(--text);
  cursor: pointer;
  transition: all 0.4s ease;
  box-shadow: 0 0 14px rgba(255,110,199,0.15);
}

.track.active {
  background: linear-gradient(135deg, var(--accent), #b86bff);
  box-shadow: 0 0 20px var(--accent-soft);
}

/* ---------- HERO ---------- */
.hero {
  min-height: 85vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 20px;
}

.hero h2 {
  font-size: clamp(2.2rem, 7vw, 3.6rem);
  font-weight: 700;
  text-shadow: 0 0 24px var(--accent-soft);
}

/* ---------- GALLERY ---------- */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 18px;
  padding: 40px 20px 80px;
}

.card {
  border-radius: 22px;
  overflow: hidden;
  transform: translateY(30px);
  opacity: 0;
  transition: all 1s ease;
}

.card.visible {
  transform: translateY(0);
  opacity: 1;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 1.2s ease;
}

.card:hover img {
  transform: scale(1.08);
}

/* ---------- FOOTER ---------- */
footer {
  text-align: center;
  padding: 40px 20px;
  font-size: 0.85rem;
  color: var(--muted);
}

/* ---------- MOBILE OPTIMIZATION ---------- */
@media (max-width: 480px) {
  .music-bar {
    gap: 6px;
  }
  .track {
    padding: 8px 12px;
    font-size: 0.75rem;
  }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="login-box">
    <h1>Just Us</h1>
    <p>Enter the secret to continue</p>
    <input type="password" id="password" placeholder="Password">
    <button onclick="checkPassword()">Enter</button>
  </div>
</div>

<!-- MAIN -->
<div id="content" class="hidden">

  <!-- MUSIC -->
  <div class="music-bar">
    <div class="track" onclick="playSong(0)">YOU THE ONE</div>
    <div class="track" onclick="playSong(1)">ELPIDA</div>
    <div class="track" onclick="playSong(2)">LOVE ME</div>
  </div>

  <section class="hero">
    <h2>1 Year Anniversary</h2>
  </section>

  <section class="gallery" id="gallery"></section>

  <footer>
    One year. Every moment still feels like the first.
  </footer>

</div>

<!-- AUDIO -->
<audio src="music/youtheone.mp3"></audio>
<audio src="music/elpida.mp3"></audio>
<audio src="music/loveme.mp3"></audio>

<script>
window.onload = function() {

  /* ---------- PASSWORD ---------- */
  const PASSWORD = "1122024"; // CHANGE THIS
  const loginBox = document.getElementById("login");
  const contentBox = document.getElementById("content");

  document.querySelector("button").onclick = function() {
    const input = document.getElementById("password").value;
    if (input === PASSWORD) {
      loginBox.style.display = "none";
      contentBox.classList.remove("hidden");
    } else {
      alert("Wrong password");
    }
  };

  /* ---------- GALLERY ---------- */
  const gallery = document.getElementById("gallery");
  for (let i = 1; i <= 37; i++) {
    const card = document.createElement("div");
    card.className = "card";
    const img = document.createElement("img");
    img.src = `images/${i}.jpg`;
    img.alt = `Memory ${i}`;
    card.appendChild(img);
    gallery.appendChild(card);
  }

  /* ---------- SCROLL ANIMATION ---------- */
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add("visible");
    });
  }, {threshold:0.2});
  document.querySelectorAll(".card").forEach(c => observer.observe(c));

  /* ---------- MUSIC CONTROL ---------- */
  const tracks = document.querySelectorAll(".track");
  const audios = document.querySelectorAll("audio");
  let musicStarted = false;

  function playSong(index) {
    audios.forEach((audio, i) => {
      audio.pause();
      audio.currentTime = 0;
      tracks[i].classList.remove("active");
    });
    audios[index].play().catch(() => {}); // catch autoplay errors
    tracks[index].classList.add("active");
  }

  // Start third song after first user interaction
  function startMusicOnInteraction() {
    if (!musicStarted) {
      playSong(2); // third song
      musicStarted = true;
      window.removeEventListener("click", startMusicOnInteraction);
      window.removeEventListener("touchstart", startMusicOnInteraction);
    }
  }

  window.addEventListener("click", startMusicOnInteraction);
  window.addEventListener("touchstart", startMusicOnInteraction);

};
</script>


</body>
</html>
